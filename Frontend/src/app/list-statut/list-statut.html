<div class="container">
  <div class="card shadow mb-4">
    <div class="card-body">


      <app-update-statut [statut]="updatedSatt" (StatuttUpdated)="updatedStatut($event) " [ajout]="ajout">
      </app-update-statut>



      <table class="table table-striped mt-3">
        <thead>
          <tr>
            <th>Id</th>
            <th>Nom Statut</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let dep of Statuts; trackBy: trackById">
            <td>{{ dep.idSat }}</td>
            <td>{{ dep.nomSat }}</td>
            <td>
              <button class="btn btn-success" (click)="updateSat(dep)">Éditer</button>
            </td>



          </tr>
        </tbody>
      </table>

    </div>
  </div>
</div>
